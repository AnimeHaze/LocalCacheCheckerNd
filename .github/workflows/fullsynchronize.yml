name: Release synchronization

on:
  #schedule:
  #  - cron: "0 1,3,9,11,12,13,14,16,18,22,23 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
            ${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run synchronization
        run: mkdir -p cache && npm start

      - name: Get all cache files with file hashes
        id: track-files
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const crypto = require('crypto');

            function getAllFiles(dirPath, arrayOfFiles = []) {
              if (!fs.existsSync(dirPath)) return arrayOfFiles;
          
              const files = fs.readdirSync(dirPath);
          
              files.forEach(file => {
                const fullPath = path.join(dirPath, file);
                if (fs.statSync(fullPath).isDirectory()) {
                  arrayOfFiles = getAllFiles(fullPath, arrayOfFiles);
                } else {
                  arrayOfFiles.push(fullPath);
                }
              });
          
              return arrayOfFiles;
            }

            function getFileHash(filePath) {
              const fileBuffer = fs.readFileSync(filePath);
              const hashSum = crypto.createHash('sha256');
              hashSum.update(fileBuffer);
              return hashSum.digest('hex');
            }
          
            const cachePath = 'cache';
            const cacheFiles = {};
          
            if (fs.existsSync(cachePath)) {
              let allCacheFiles = getAllFiles(cachePath);

              allCacheFiles.sort((a, b) => path.basename(a).localeCompare(path.basename(b)));
          
              allCacheFiles.forEach(file => {
                const hash = getFileHash(file);
                const relativePath = path.relative(process.cwd(), file).replace(/\\/g, '/');
                cacheFiles[relativePath] = hash;
              });
            }
          
            const trackingData = {
              sync_timestamp: new Date().toISOString(),
              generated_at: new Date().toLocaleString('en-US', { timeZone: 'UTC' }),
              cache_files: cacheFiles
            };
          
            fs.writeFileSync('sync_tracking.json', JSON.stringify(trackingData, null, 2));
            console.log(`Tracked \${Object.keys(cacheFiles).length} cache files with hashes`);
          "

      - name: Commit changes to main branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-sync: Synchronized files"
          file_pattern: |
            **/*
            !sync_tracking.json

      - name: Force push tracking to release branch
        run: |
          if [ -f sync_tracking.json ]; then
            trackingContent=$(cat sync_tracking.json)
            git checkout release 2>/dev/null || git checkout --orphan release
            git rm -rf --quiet .
            echo "$trackingContent" > modified_files_tracking.json
          
            git add modified_files_tracking.json
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "Sync tracking: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
            git push origin release --force
            echo "Force pushed tracking data to release branch"
          
            git checkout main
          else
            echo "No tracking data generated"
          fi