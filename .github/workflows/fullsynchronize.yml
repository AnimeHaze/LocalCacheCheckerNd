name: Release synchronization

on:
  #schedule:
  #  - cron: "0 1,3,9,11,12,13,14,16,18,22,23 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-
            ${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run synchronization
        run: npm start

      - name: Get all cache files with file hashes
        id: track-files
        run: |
          $cacheFiles = [ordered]@{}
          
          $allCacheFiles = Get-ChildItem -Path "cache" -File -Recurse -ErrorAction SilentlyContinue
          
          $sortedFiles = $allCacheFiles | Sort-Object Name
          
          foreach ($file in $sortedFiles) {
            $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256 | Select-Object -ExpandProperty Hash
          
            $relativePath = $file.FullName.Replace("$PWD\", "").Replace("\", "/")
            $cacheFiles[$relativePath] = $hash
          }
          
          $trackingData = [ordered]@{
            sync_timestamp = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
            generated_at = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            cache_files = $cacheFiles
          }
          
          $trackingData | ConvertTo-Json -Depth 4 | Out-File "sync_tracking.json"
          echo "Tracked $($cacheFiles.Count) cache files with hashes"

      - name: Commit changes to main branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-sync: Synchronized files"
          file_pattern: |
            **/*
            !sync_tracking.json

      - name: Force push tracking to release branch
        run: |
          if (Test-Path sync_tracking.json) {
            $trackingContent = Get-Content sync_tracking.json -Raw
            git checkout release 2>$null || git checkout --orphan release
            git rm -rf --quiet .
            $trackingContent | Out-File "modified_files_tracking.json" -Encoding UTF8
          
            git add modified_files_tracking.json
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "Sync tracking: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')"
          
            git push origin release --force
            echo "Force pushed tracking data to release branch"
          
            git checkout main
          } else {
            echo "No tracking data generated"
          }